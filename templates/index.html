<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python ATM Pro</title>
    <style>
        :root {
            --primary: #2ecc71;
            --dark: #1a1a2e;
            --accent: #16213e;
            --danger: #e74c3c;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text);
        }

        .atm-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 380px;
            text-align: center;
        }

        .screen {
            background: #000;
            border: 2px solid #333;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: inset 0 0 10px #2ecc7155;
        }

        .balance-label { font-size: 0.75rem; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; }
        .balance-amount { font-size: 2rem; font-family: 'Courier New', monospace; font-weight: bold; margin-top: 5px; }

        input {
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-dep { background: var(--primary); color: #000; }
        .btn-with { background: var(--danger); color: white; }
        .btn-bal { background: #555; color: white; grid-column: span 2; }

        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:active { transform: translateY(0); }

        #statusMsg {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
        }
    </style>
</head>
<body>

<div class="atm-card">
    <h2 style="margin-top:0">PYTHON BANK 🏦</h2>
    
    <div class="screen">
        <div class="balance-label">Verified Balance</div>
        <div id="display" class="balance-amount">$1,000.00</div>
    </div>

    <input type="number" id="amountInput" placeholder="0.00" step="0.01">

    <div class="btn-grid">
        <button class="btn-dep" onclick="sendAction('deposit')">Deposit</button>
        <button class="btn-with" onclick="sendAction('withdraw')">Withdraw</button>
        <button class="btn-bal" onclick="sendAction('check')">Refresh Balance</button>
    </div>

    <div id="statusMsg">Ready for transaction...</div>
</div>

<script>
    async function sendAction(type) {
        const amountInput = document.getElementById('amountInput');
        const statusMsg = document.getElementById('statusMsg');
        const display = document.getElementById('display');
        const amount = Number(amountInput.value) || 0;

        try {
            const response = await fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: type, amount: amount })
            });

            const data = await response.json();
            display.innerText = `$${Number(data.balance).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            statusMsg.innerText = data.message;
            amountInput.value = '';
        } catch (error) {
            statusMsg.innerText = "Error connecting to Python server!";
            console.error(error);
        }
    }
</script>

</body>
</html>
